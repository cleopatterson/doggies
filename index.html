<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#005eb8" />
    <title>{{ogTitle}}</title>

    <!-- Open Graph (WhatsApp link preview) — absolute URLs so previews work cleanly. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Dog Yard" />
    <meta property="og:url" content="{{siteUrl}}" />
    <meta property="og:title" content="{{ogTitle}}" />
    <meta property="og:description" content="{{ogDescription}}" />
    <meta property="og:image" content="{{siteUrl}}/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Dog Yard — for the Parkyard boys" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="{{ogTitle}}" />
    <meta name="twitter:description" content="{{ogDescription}}" />
    <meta name="twitter:image" content="{{siteUrl}}/og-image.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      html, body, #root { margin: 0; padding: 0; min-height: 100%; background: #060a10; }
      body { font-family: 'Inter', -apple-system, sans-serif; -webkit-font-smoothing: antialiased; }
      * { box-sizing: border-box; }
      button { font-family: inherit; }
      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
